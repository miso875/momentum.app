<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Momentum — Habit & Discipline Tracker</title>
<meta name="theme-color" content="#0A0B10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --radius-xl:26px; --radius-lg:20px; --radius-md:14px; --radius-sm:10px;
  --font-display:'Outfit',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --accent-violet:#8B6CFF; --accent-coral:#FF7A59; --accent-mint:#3DDC97; --accent-indigo:#6C7BFF;
  --accent-gold:#FFC857; --accent-pink:#FF6FA8; --accent-slate:#9097AC; --danger:#FF5C5C;
  --nav-h:64px; --header-h:64px;
}
:root[data-theme="dark"]{
  --bg-base:#0A0B10; --bg-surface:#13151C; --bg-card:#171A23; --bg-elevated:#1E212C;
  --glass-bg:rgba(30,33,44,.55); --glass-border:rgba(255,255,255,.08);
  --border-subtle:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.14);
  --ink-primary:#F5F4F9; --ink-secondary:#AFB1C2; --ink-muted:#71748A;
  --shadow-soft:0 10px 30px rgba(0,0,0,.35); --shadow-pop:0 20px 50px rgba(0,0,0,.5);
  --scrim:rgba(6,7,11,.7);
}
:root[data-theme="light"]{
  --bg-base:#F3F2F8; --bg-surface:#FFFFFF; --bg-card:#FFFFFF; --bg-elevated:#FFFFFF;
  --glass-bg:rgba(255,255,255,.65); --glass-border:rgba(20,20,40,.08);
  --border-subtle:rgba(20,20,40,.09); --border-strong:rgba(20,20,40,.16);
  --ink-primary:#15161F; --ink-secondary:#52546A; --ink-muted:#888AA0;
  --shadow-soft:0 10px 26px rgba(30,30,60,.08); --shadow-pop:0 20px 46px rgba(30,30,60,.14);
  --scrim:rgba(20,20,35,.45);
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  background:var(--bg-base); color:var(--ink-primary); font-family:var(--font-body);
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
  background-image:
    radial-gradient(900px 500px at 110% -10%, color-mix(in srgb, var(--accent-violet) 18%, transparent), transparent 60%),
    radial-gradient(700px 420px at -10% 0%, color-mix(in srgb, var(--accent-coral) 12%, transparent), transparent 60%);
  background-attachment:fixed;
}
::selection{ background:var(--accent-violet); color:#fff; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; }
input,select,textarea{ font-family:inherit; }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:10px; }
:focus-visible{ outline:2px solid var(--accent-violet); outline-offset:2px; border-radius:6px; }
@media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; transition-duration:.001ms !important; } }

h1,h2,h3,h4{ font-family:var(--font-display); letter-spacing:-.01em; }
.mono{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; }
.muted{ color:var(--ink-secondary); }
.faint{ color:var(--ink-muted); }

/* ============ LAYOUT SHELL ============ */
#app{ min-height:100%; display:flex; flex-direction:column; }
.shell{ display:flex; flex:1; min-height:0; }
.topbar{
  position:sticky; top:0; z-index:30; height:var(--header-h);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; backdrop-filter:blur(18px) saturate(160%);
  background:var(--glass-bg); border-bottom:1px solid var(--glass-border);
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:32px; height:32px; border-radius:10px;
  background:linear-gradient(135deg, var(--accent-indigo), var(--accent-coral));
  display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-soft);
}
.brand-mark svg{ width:16px; height:16px; stroke:#fff; }
.brand-name{ font-family:var(--font-display); font-weight:700; font-size:17px; }
.topbar-right{ display:flex; align-items:center; gap:8px; }
.icon-btn{
  width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  background:var(--bg-card); border:1px solid var(--border-subtle); color:var(--ink-secondary);
  transition:transform .15s ease, background .2s ease, color .2s ease;
}
.icon-btn:hover{ color:var(--ink-primary); transform:translateY(-1px); }
.icon-btn:active{ transform:scale(.94); }
.icon-btn svg{ width:18px; height:18px; }
.level-chip{
  display:flex; align-items:center; gap:6px; padding:6px 10px 6px 6px; border-radius:999px;
  background:var(--bg-card); border:1px solid var(--border-subtle); font-size:12.5px; font-weight:600;
}
.level-dot{
  width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--accent-gold), var(--accent-coral)); color:#1a1303; font-size:11px; font-weight:800; font-family:var(--font-mono);
}

main{ flex:1; min-width:0; padding:18px 16px calc(var(--nav-h) + 28px); max-width:1180px; margin:0 auto; width:100%; }
.page{ display:none; animation:fadeUp .35s ease; }
.page.active{ display:block; }
@keyframes fadeUp{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

/* bottom nav (mobile) */
.bottom-nav{
  position:fixed; bottom:0; left:0; right:0; z-index:40; height:var(--nav-h);
  display:flex; backdrop-filter:blur(20px) saturate(160%); background:var(--glass-bg);
  border-top:1px solid var(--glass-border); padding-bottom:env(safe-area-inset-bottom);
}
.nav-item{
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
  color:var(--ink-muted); font-size:10.5px; font-weight:600; position:relative;
}
.nav-item svg{ width:20px; height:20px; transition:transform .2s ease; }
.nav-item.active{ color:var(--accent-violet); }
.nav-item.active svg{ transform:translateY(-2px); }
.nav-item .dot{ position:absolute; top:4px; right:30%; width:6px; height:6px; border-radius:50%; background:var(--accent-coral); display:none; }
.nav-item.has-alert .dot{ display:block; }

/* desktop sidebar */
.sidebar{ display:none; }
@media (min-width:900px){
  .shell{ gap:0; }
  .sidebar{
    display:flex; flex-direction:column; width:230px; flex-shrink:0; padding:22px 14px;
    border-right:1px solid var(--border-subtle); gap:4px; position:sticky; top:var(--header-h); height:calc(100vh - var(--header-h));
  }
  .sidebar .nav-item{ flex:none; flex-direction:row; justify-content:flex-start; gap:12px; padding:11px 14px; border-radius:13px; font-size:14px; }
  .sidebar .nav-item.active{ background:var(--bg-card); color:var(--ink-primary); }
  .sidebar .nav-item.active svg{ stroke:var(--accent-violet); transform:none; }
  .sidebar .nav-item .dot{ position:static; margin-left:auto; display:none; }
  .sidebar .nav-item.has-alert .dot{ display:block; }
  .bottom-nav{ display:none; }
  main{ padding:26px 36px 50px; }
}

/* ============ CARD / GLASS ============ */
.card{
  background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-lg);
  padding:18px; box-shadow:var(--shadow-soft);
}
.glass{ background:var(--glass-bg); backdrop-filter:blur(16px) saturate(160%); border:1px solid var(--glass-border); }
.section-title{ display:flex; align-items:center; justify-content:space-between; margin:26px 0 12px; }
.section-title h2{ font-size:15px; font-weight:700; }
.section-title .link{ font-size:12.5px; color:var(--accent-violet); font-weight:600; display:flex; align-items:center; gap:2px; }
.grid{ display:grid; gap:14px; }
@media (min-width:900px){ .grid-2{ grid-template-columns:1.1fr .9fr; } .grid-3{ grid-template-columns:repeat(3,1fr); } }

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:11px 18px; border-radius:13px;
  font-weight:650; font-size:14px; border:1px solid transparent; transition:transform .15s ease, opacity .2s ease; white-space:nowrap;
}
.btn:active{ transform:scale(.97); }
.btn-primary{ background:linear-gradient(135deg, var(--accent-violet), #6a4fe0); color:#fff; box-shadow:0 8px 22px rgba(139,108,255,.35); }
.btn-secondary{ background:var(--bg-elevated); color:var(--ink-primary); border-color:var(--border-subtle); }
.btn-ghost{ background:transparent; color:var(--ink-secondary); }
.btn-danger{ background:rgba(255,92,92,.12); color:var(--danger); border-color:rgba(255,92,92,.25); }
.btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:10px; }
.btn-block{ width:100%; }
.btn svg{ width:16px; height:16px; }

.chip{ display:inline-flex; align-items:center; gap:6px; padding:6px 11px; border-radius:999px; font-size:12px; font-weight:600; border:1px solid var(--border-subtle); background:var(--bg-elevated); color:var(--ink-secondary); }
.chip.active{ color:#fff; border-color:transparent; }
.dot-sm{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ============ DASHBOARD ============ */
.hero-card{ position:relative; border-radius:var(--radius-xl); padding:26px 22px; overflow:hidden; border:1px solid var(--border-subtle);
  background:linear-gradient(165deg, var(--bg-elevated), var(--bg-card)); }
.hero-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.hero-greeting{ font-size:13px; color:var(--ink-secondary); font-weight:600; }
.hero-date{ font-size:12px; color:var(--ink-muted); margin-top:2px; }
.streak-pill{ display:flex; align-items:center; gap:6px; background:var(--bg-card); border:1px solid var(--border-subtle); padding:7px 12px; border-radius:999px; font-size:13px; font-weight:700; }
.streak-pill svg{ width:15px; height:15px; stroke:var(--accent-coral); fill:none; }

.momentum-wrap{ display:flex; align-items:center; gap:22px; margin-top:18px; flex-wrap:wrap; }
.momentum-ring-box{ position:relative; width:184px; height:184px; flex-shrink:0; }
.momentum-ring-box svg{ width:100%; height:100%; transform:rotate(-90deg); }
.momentum-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.momentum-score{ font-family:var(--font-mono); font-size:42px; font-weight:700; line-height:1; }
.momentum-label{ font-size:10.5px; text-transform:uppercase; letter-spacing:.09em; color:var(--ink-muted); margin-top:5px; font-weight:700; }
.momentum-msg{ font-size:14.5px; line-height:1.5; max-width:320px; }
.momentum-breakdown{ display:flex; flex-direction:column; gap:9px; margin-top:6px; flex:1; min-width:180px; }
.mb-row{ display:flex; align-items:center; gap:9px; font-size:12px; }
.mb-row .mb-label{ width:64px; color:var(--ink-secondary); font-weight:600; flex-shrink:0; }
.mb-bar{ flex:1; height:6px; border-radius:6px; background:var(--bg-base); overflow:hidden; }
.mb-fill{ height:100%; border-radius:6px; transition:width .6s cubic-bezier(.2,.8,.2,1); }
.mb-val{ width:34px; text-align:right; font-family:var(--font-mono); color:var(--ink-muted); font-size:11px; }

.stat-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:16px; }
@media (min-width:560px){ .stat-grid{ grid-template-columns:repeat(4,1fr); } }
.stat-box{ background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:14px; }
.stat-box .val{ font-family:var(--font-mono); font-size:21px; font-weight:700; }
.stat-box .lbl{ font-size:11.5px; color:var(--ink-muted); margin-top:3px; font-weight:600; }

.habit-row{
  display:flex; align-items:center; gap:13px; padding:13px 14px; border-radius:var(--radius-md);
  background:var(--bg-card); border:1px solid var(--border-subtle); margin-bottom:9px; transition:transform .15s ease, opacity .2s ease;
}
.habit-row.done{ opacity:.62; }
.habit-check{
  width:30px; height:30px; border-radius:50%; border:2px solid var(--border-strong); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all .18s ease; background:transparent;
}
.habit-check svg{ width:15px; height:15px; stroke:#fff; opacity:0; transform:scale(.5); transition:all .18s ease; }
.habit-check.checked{ border-color:transparent; }
.habit-check.checked svg{ opacity:1; transform:scale(1); }
.habit-info{ flex:1; min-width:0; cursor:pointer; }
.habit-name{ font-size:14.5px; font-weight:650; display:flex; align-items:center; gap:7px; }
.habit-meta{ font-size:11.5px; color:var(--ink-muted); margin-top:3px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.habit-streak{ display:flex; align-items:center; gap:3px; font-family:var(--font-mono); font-weight:600; color:var(--accent-coral); }
.habit-streak svg{ width:11px; height:11px; stroke:var(--accent-coral); }
.habit-row .chev{ width:16px; height:16px; stroke:var(--ink-muted); flex-shrink:0; }

.empty-state{ text-align:center; padding:38px 20px; }
.empty-state .ico{ width:54px; height:54px; border-radius:18px; margin:0 auto 14px; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--accent-violet), var(--accent-indigo)); }
.empty-state .ico svg{ width:26px; height:26px; stroke:#fff; }
.empty-state h3{ font-size:16px; margin-bottom:6px; }
.empty-state p{ font-size:13px; color:var(--ink-secondary); max-width:320px; margin:0 auto 16px; line-height:1.5; }
.suggest-chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }

.banner{ display:flex; align-items:flex-start; gap:12px; padding:15px; border-radius:var(--radius-md); margin-bottom:14px; border:1px solid; }
.banner.warn{ background:rgba(255,122,89,.08); border-color:rgba(255,122,89,.25); }
.banner.good{ background:rgba(61,220,151,.08); border-color:rgba(61,220,151,.25); }
.banner .ico{ width:34px; height:34px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.banner.warn .ico{ background:rgba(255,122,89,.18); }
.banner.good .ico{ background:rgba(61,220,151,.18); }
.banner .ico svg{ width:17px; height:17px; }
.banner.warn .ico svg{ stroke:var(--accent-coral); }
.banner.good .ico svg{ stroke:var(--accent-mint); }
.banner h4{ font-size:13.5px; margin-bottom:3px; }
.banner p{ font-size:12.5px; color:var(--ink-secondary); line-height:1.5; }

/* ============ HABITS PAGE ============ */
.filter-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
.filter-row::-webkit-scrollbar{ display:none; }
.cat-group{ margin-bottom:20px; }
.cat-group-title{ display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:700; color:var(--ink-secondary); margin-bottom:9px; text-transform:uppercase; letter-spacing:.05em; }

/* ============ HABIT DETAIL / MODAL ============ */
.modal-overlay{ position:fixed; inset:0; background:var(--scrim); backdrop-filter:blur(3px); z-index:90; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.open{ display:flex; animation:fadeIn .2s ease; }
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
.modal{
  background:var(--bg-surface); width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
  border-radius:24px 24px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom));
  animation:slideUp .28s cubic-bezier(.16,1,.3,1); border:1px solid var(--border-subtle); border-bottom:none;
}
@media (min-width:640px){ .modal-overlay{ align-items:center; } .modal{ border-radius:24px; max-height:85vh; animation:popIn .22s cubic-bezier(.16,1,.3,1); } }
@keyframes slideUp{ from{transform:translateY(40px); opacity:0;} to{transform:translateY(0); opacity:1;} }
@keyframes popIn{ from{transform:scale(.94); opacity:0;} to{transform:scale(1); opacity:1;} }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.modal-head h3{ font-size:17px; }
.modal-handle{ width:36px; height:4px; border-radius:4px; background:var(--border-strong); margin:0 auto 14px; }

.field{ margin-bottom:15px; }
.field label{ display:block; font-size:12.5px; font-weight:650; color:var(--ink-secondary); margin-bottom:7px; }
.field input[type=text], .field input[type=number], .field input[type=time], .field input[type=date], .field select, .field textarea{
  width:100%; background:var(--bg-card); border:1px solid var(--border-subtle); border-radius:12px; padding:11px 13px;
  font-size:14px; color:var(--ink-primary); transition:border-color .2s ease;
}
.field textarea{ resize:vertical; min-height:78px; line-height:1.5; }
.field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--accent-violet); }
.seg{ display:flex; gap:7px; background:var(--bg-card); padding:4px; border-radius:13px; border:1px solid var(--border-subtle); }
.seg button{ flex:1; padding:9px 6px; border-radius:10px; background:transparent; border:none; font-size:12.5px; font-weight:650; color:var(--ink-muted); }
.seg button.active{ background:var(--accent-violet); color:#fff; }
.day-toggles{ display:flex; gap:6px; flex-wrap:wrap; }
.day-toggle{ width:38px; height:38px; border-radius:11px; background:var(--bg-card); border:1px solid var(--border-subtle); font-size:11.5px; font-weight:700; color:var(--ink-muted); }
.day-toggle.active{ background:var(--accent-violet); color:#fff; border-color:transparent; }
.cat-pick{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.cat-pick-item{ display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 4px; border-radius:13px; background:var(--bg-card); border:1.5px solid var(--border-subtle); font-size:10.5px; font-weight:650; color:var(--ink-secondary); }
.cat-pick-item.active{ border-color:var(--cat-color); background:color-mix(in srgb, var(--cat-color) 14%, var(--bg-card)); color:var(--ink-primary); }
.cat-pick-item .sw{ width:18px; height:18px; border-radius:6px; background:var(--cat-color); }
.modal-actions{ display:flex; gap:10px; margin-top:18px; }

/* ============ RINGS / CHARTS ============ */
.ring-row{ display:flex; align-items:center; gap:14px; }
.mini-ring-box{ position:relative; width:58px; height:58px; flex-shrink:0; }
.mini-ring-box svg{ width:100%; height:100%; transform:rotate(-90deg); }
.mini-ring-val{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:13px; font-weight:700; }

.heatmap-scroll{ overflow-x:auto; padding-bottom:6px; }
.heatmap-grid{ display:grid; grid-auto-flow:column; grid-template-rows:repeat(7,1fr); gap:3px; width:max-content; }
.hm-cell{ width:11px; height:11px; border-radius:3px; background:var(--bg-elevated); }
.hm-legend{ display:flex; align-items:center; gap:5px; margin-top:8px; font-size:10.5px; color:var(--ink-muted); }
.hm-legend .hm-cell{ width:9px; height:9px; }

.bar-chart{ display:flex; align-items:flex-end; gap:6px; height:110px; }
.bar-chart .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px; height:100%; }
.bar-chart .bar{ width:100%; max-width:22px; border-radius:6px 6px 3px 3px; min-height:3px; transition:height .5s cubic-bezier(.2,.8,.2,1); }
.bar-chart .bar-lbl{ font-size:10px; color:var(--ink-muted); font-weight:600; }

.badge-row{ display:flex; gap:10px; flex-wrap:wrap; }
.badge{ width:64px; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }
.badge-ico{ width:48px; height:48px; border-radius:16px; display:flex; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--border-subtle); opacity:.35; filter:grayscale(1); }
.badge.unlocked .badge-ico{ opacity:1; filter:none; background:linear-gradient(135deg, var(--accent-gold), var(--accent-coral)); box-shadow:0 6px 16px rgba(255,170,80,.3); }
.badge-ico svg{ width:20px; height:20px; stroke:var(--ink-secondary); }
.badge.unlocked .badge-ico svg{ stroke:#1a1303; }
.badge .b-lbl{ font-size:9.5px; font-weight:650; color:var(--ink-muted); line-height:1.3; }
.badge.unlocked .b-lbl{ color:var(--ink-secondary); }

/* ============ REFLECT ============ */
.slider-row{ margin-bottom:18px; }
.slider-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
.slider-head .lab{ display:flex; align-items:center; gap:8px; font-size:13.5px; font-weight:650; }
.slider-head .lab svg{ width:16px; height:16px; }
.slider-head .cur{ font-family:var(--font-mono); font-size:13px; color:var(--ink-secondary); }
.range-track{ display:flex; gap:6px; }
.range-seg{ flex:1; height:9px; border-radius:6px; background:var(--bg-elevated); border:1px solid var(--border-subtle); }
.range-seg.filled{ background:var(--seg-color); border-color:transparent; }

.toast-host{ position:fixed; top:14px; left:0; right:0; z-index:200; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; }

/* ---------- CATEGORY CONFIG ---------- */
const CATEGORIES = {

};
const FITNESS_SUBTYPES = {gym:'Gym Session', cardio:'Cardio', weight:'Weight Log', other:'Other Workout'};
const MIND_SUBTYPES = {meditation:'Meditation', prayer:'Prayer', journal:'Journaling', screenfree:'Screen-free Time'};
const SUGGESTED = [

  {name:'Journal', category:'mindfulness', subtype:'journal', frequency:{type:'daily'}},
];
const ACHIEVEMENTS_DEF = [
  {id:'first-habit', label:'First Step', desc:'Create your first habit', icon:'star'},
  {id:'streak-7', label:'One Week Strong', desc:'Hit a 7-day streak', icon:'flame'},

  {id:'streak-100', label:'Centurion', desc:'Hit a 100-day streak', icon:'trophy'},
  {id:'streak-365', label:'Legend', desc:'Hit a 365-day streak', icon:'trophy'},
  {id:'perfect-week', label:'Perfect Week', desc:'100% completion, 7 days straight', icon:'star'},
  {id:'comeback', label:'Comeback Kid', desc:'Rebuilt a streak after a reset', icon:'refresh'},
  {id:'reflective-7', label:'Reflective Mind', desc:'Logged mood 7 days running', icon:'smile'},

];

const MONTH_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* ---------- DATE UTILS ---------- */
function pad(n){ return n<10?'0'+n:''+n; }
function toISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseISO(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function todayDate(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function todayStr(){ return toISO(todayDate()); }
function dowMon(d){ return (d.getDay()+6)%7; } // 0=Mon..6=Sun
function startOfWeek(d){ return addDays(d, -dowMon(d)); }
function weekKey(d){ return toISO(startOfWeek(d)); }
function fmtDateLong(d){ return d.toLocaleDateString(undefined,{weekday:'long', month:'long', day:'numeric'}); }
function fmtDateShort(d){ return d.toLocaleDateString(undefined,{month:'short', day:'numeric'}); }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }

/* ---------- STORAGE ---------- */
const STORE_KEY = 'momentum-app-state-v1';
let DB = null; // in-memory state
let saveTimer = null;
function defaultDB(){
  return {
    habits:[], completions:{}, dailyLogs:{}, weeklyReviews:{},
    appState:{ theme:'dark', xp:0, level:1, freezesTotal:3, freezesUsed:[], freezeMonth: todayStr().slice(0,7),
      onboarded:false, comebackFlags:{}, comebacksAchieved:[], unlockedAchievements:[], unitSystem:'metric',
      currentPage:'home', habitFilter:'all' }
  };
}
async function loadDB(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ DB = JSON.parse(raw); }
    else DB = defaultDB();
  }catch(e){ DB = defaultDB(); }
  // backfill any missing fields (forward-compat)
  const d = defaultDB();
  DB.habits = DB.habits || [];
  DB.completions = DB.completions || {};
  DB.dailyLogs = DB.dailyLogs || {};
  DB.weeklyReviews = DB.weeklyReviews || {};
  DB.appState = Object.assign({}, d.appState, DB.appState||{});
}
function saveDB(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }catch(e){ console.error('save failed', e); toast('Storage full or unavailable — changes may not save'); }
  }, 220);
}

/* ---------- HABIT HELPERS ---------- */
function compKey(habitId,dateStr){ return habitId+'|'+dateStr; }
function getCompletion(habitId,dateStr){ return DB.completions[compKey(habitId,dateStr)]; }
function setCompletion(habitId,dateStr,rec){ DB.completions[compKey(habitId,dateStr)] = rec; }
function clearCompletion(habitId,dateStr){ delete DB.completions[compKey(habitId,dateStr)]; }
function activeHabits(){ return DB.habits.filter(h=>!h.archived); }
function habitById(id){ return DB.habits.find(h=>h.id===id); }

function isDueOnDay(habit, dateStr){
  const created = habit.createdAt;
  if(dateStr < created) return false;
  if(habit.frequency.type==='daily') return true;
  if(habit.frequency.type==='weekly') return true; // available any day, tracked weekly
  if(habit.frequency.type==='custom'){
    const dow = dowMon(parseISO(dateStr));
    return (habit.frequency.days||[]).includes(dow);
  }
  return true;
}
function isFreezeRec(rec){ return rec && rec.freeze; }
function isDoneRec(rec){ return rec && rec.completed; }

function countCompletionsInWeek(habit, weekStartDate){
  let n=0;
  for(let i=0;i<7;i++){
    const ds = toISO(addDays(weekStartDate,i));
    if(ds>todayStr()) continue;
    const rec = getCompletion(habit.id, ds);
    if(isDoneRec(rec)||isFreezeRec(rec)) n++;
  }
  return n;
}

function computeCurrentStreak(habit){
  const today = todayDate();
  if(habit.frequency.type==='weekly'){
    let cursor = startOfWeek(today);
    let streak=0; let guard=0;
    while(guard++<600){
      if(cursor < parseISO(weekKey(parseISO(habit.createdAt)))) break;
      const target = habit.frequency.target||1;
      const cnt = countCompletionsInWeek(habit, cursor);
      const isCurrent = toISO(cursor)===weekKey(today);
      if(cnt>=target) streak++;
      else if(isCurrent){ /* in progress, no break */ }
      else break;
      cursor = addDays(cursor,-7);
    }
    return streak;
  }
  let cursor = today; let streak=0; let guard=0;
  while(guard++<3000){
    const ds = toISO(cursor);
    if(ds < habit.createdAt) break;
    if(isDueOnDay(habit, ds)){
      const rec = getCompletion(habit.id, ds);
      if(isDoneRec(rec)||isFreezeRec(rec)) streak++;
      else if(ds===todayStr()){ /* pending today, skip without breaking */ }
      else break;
    }
    cursor = addDays(cursor,-1);
  }
  return streak;
}

function computeLongestStreak(habit){
  const created = parseISO(habit.createdAt);
  const today = todayDate();
  let max=0;
  if(habit.frequency.type==='weekly'){
    let cursor = startOfWeek(created); let run=0;
    while(cursor<=today){
      const cnt = countCompletionsInWeek(habit, cursor);
      const target = habit.frequency.target||1;
      const isCurrent = toISO(cursor)===weekKey(today);
      if(cnt>=target){ run++; max=Math.max(max,run); }
      else if(!isCurrent){ run=0; }
      cursor = addDays(cursor,7);
    }
    return max;
  }
  let run=0; let cursor=new Date(created);
  while(cursor<=today){
    const ds = toISO(cursor);
    if(isDueOnDay(habit, ds)){
      const rec = getCompletion(habit.id, ds);
      const isToday = ds===todayStr();
      if(isDoneRec(rec)||isFreezeRec(rec)){ run++; max=Math.max(max,run); }
      else if(!isToday){ run=0; }
    }
    cursor = addDays(cursor,1);
  }
  return max;
}

function rangeStats(habit, fromDate, toDate){
  // returns {due, completed, missed, frozen}
  let due=0, completed=0, frozen=0;
  if(habit.frequency.type==='weekly'){
    let cursor = startOfWeek(fromDate);
    const target = habit.frequency.target||1;
    while(cursor<=toDate){
      if(toISO(addDays(cursor,6)) >= habit.createdAt){
        due += target;
        const cnt = countCompletionsInWeek(habit, cursor);
        completed += Math.min(cnt,target);
      }
      cursor = addDays(cursor,7);
    }
  } else {
    let cursor = new Date(fromDate);
    while(cursor<=toDate){
      const ds = toISO(cursor);
      if(isDueOnDay(habit, ds) && ds<=todayStr()){
        due++;
        const rec = getCompletion(habit.id, ds);
        if(isDoneRec(rec)) completed++;
        else if(isFreezeRec(rec)){ completed++; frozen++; }
      }
      cursor = addDays(cursor,1);
    }
  }
  return {due, completed, missed:Math.max(0,due-completed), frozen};
}
function last7(){ return [addDays(todayDate(),-6), todayDate()]; }
function last30(){ return [addDays(todayDate(),-29), todayDate()]; }
function thisWeekRange(){ const s=startOfWeek(todayDate()); return [s, todayDate()]; }
function thisMonthRange(){ const d=todayDate(); return [new Date(d.getFullYear(),d.getMonth(),1), todayDate()]; }

function totalCompletions(habit){
  let n=0;
  Object.keys(DB.completions).forEach(k=>{
    if(k.startsWith(habit.id+'|') && isDoneRec(DB.completions[k])) n++;
  });
  return n;
}

/* ---------- XP / LEVEL ---------- */
function levelForXP(xp){
  let lvl=1, need=150;
  let total=0;
  while(xp >= total+need){ total+=need; lvl++; need = Math.round(150 + (lvl-1)*55); }
  return lvl;
}
function xpIntoLevel(xp){
  let lvl=1, need=150, total=0;
  while(xp >= total+need){ total+=need; lvl++; need = Math.round(150 + (lvl-1)*55); }
  return {into:xp-total, need};
}
function awardXP(amount){
  DB.appState.xp = Math.max(0, DB.appState.xp + amount);
  DB.appState.level = levelForXP(DB.appState.xp);
}

/* ---------- TOGGLE COMPLETION ---------- */
function toggleHabit(habitId, dateStr, presetValue){
  const habit = habitById(habitId);
  if(!habit) return;
  const rec = getCompletion(habitId, dateStr);
  if(isDoneRec(rec)){
    clearCompletion(habitId, dateStr);
    awardXP(-10);
  } else {
    const needsValue = (habit.category==='sleep') || (habit.category==='fitness' && habit.subtype==='weight');
    if(needsValue && !presetValue){
      openLogValueModal(habit, dateStr);
      return;
    }
    const beforeStreak = computeCurrentStreak(habit);
    setCompletion(habitId, dateStr, Object.assign({completed:true, ts:Date.now()}, presetValue||{}));
    let bonus = 10;
    const afterStreak = computeCurrentStreak(habit);
    if([7,30,100,365].includes(afterStreak)) bonus += {7:50,30:200,100:500,365:2000}[afterStreak];
    awardXP(bonus);
    detectComebackSuccess(habit, afterStreak);
  }
  saveDB();
  checkAchievements();
  renderAll();
}
function useFreezeOnHabit(habitId){
  const used = (DB.appState.freezesUsed||[]).filter(f=>f.month===DB.appState.freezeMonth).length;
  if(used >= DB.appState.freezesTotal){ toast('No streak freezes left this month', 'snow'); return; }
  const ds = todayStr();
  setCompletion(habitId, ds, {freeze:true, ts:Date.now()});
  DB.appState.freezesUsed.push({habitId, date:ds, month:DB.appState.freezeMonth});
  saveDB(); renderAll();
  toast('Streak frozen for today', 'snow');
}

/* ---------- BOUNCE BACK ---------- */
function detectBounceBacks(){
  const out=[];
  activeHabits().forEach(h=>{
    const cur = computeCurrentStreak(h);
    if(cur>0) return;
    // find most recent completed date
    let lastDone=null;
    for(let i=0;i<60;i++){
      const ds = toISO(addDays(todayDate(),-i));
      const rec = getCompletion(h.id, ds);
      if(isDoneRec(rec)||isFreezeRec(rec)){ lastDone=ds; break; }
    }
    if(!lastDone) return;
    const gap = daysBetween(parseISO(lastDone), todayDate());
    const longest = computeLongestStreak(h);
    if(gap>=1 && gap<=10 && longest>=3){
      out.push({habit:h, lastDone, gap, longest});
      DB.appState.comebackFlags[h.id] = true;
    }
  });
  return out;
}
function detectComebackSuccess(habit, newStreak){
  if(DB.appState.comebackFlags[habit.id] && newStreak>=7){
    if(!DB.appState.comebacksAchieved.includes(habit.id)){
      DB.appState.comebacksAchieved.push(habit.id);
    }
    delete DB.appState.comebackFlags[habit.id];
  }
}

/* ---------- MOMENTUM SCORE ---------- */
function pctInRange(habits, from, to){
  let due=0, comp=0;
  habits.forEach(h=>{ const s=rangeStats(h, from, to); due+=s.due; comp+=s.completed; });
  return due>0 ? (comp/due)*100 : null;
}
function computeMomentum(){
  const [f,t] = last7();
  const all = activeHabits();
  const byCat = c => all.filter(h=>h.category===c);
  const parts = {
    completion: pctInRange(all, f, t),
    sleep: pctInRange(byCat('sleep'), f, t),
    fitness: pctInRange(byCat('fitness'), f, t),
    study: pctInRange(byCat('study'), f, t),
  };
  const streakVals = all.map(h=> Math.min(computeCurrentStreak(h)/30,1)*100 );
  const streakFactor = streakVals.length ? streakVals.reduce((a,b)=>a+b,0)/streakVals.length : null;
  const weights = {completion:.30, sleep:.20, fitness:.20, study:.20, streak:.10};
  const vals = Object.assign({}, parts, {streak:streakFactor});
  let totalW=0, sum=0;
  Object.keys(weights).forEach(k=>{
    if(vals[k]!==null && !isNaN(vals[k])){ sum += vals[k]*weights[k]; totalW += weights[k]; }
  });
  const score = totalW>0 ? Math.round(sum/totalW) : 0;
  return {score, parts:vals};
}
function momentumMessage(score, completedToday, totalToday){
  if(totalToday===0) return "Add a habit to start building momentum.";
  if(score>=90) return "Elite discipline. You're operating at full momentum.";
  if(score>=75) return "You're building serious momentum — keep stacking days.";
  if(score>=55) return "Solid rhythm forming. Consistency beats intensity.";
  if(score>=35){
    const remaining = totalToday-completedToday;
    if(remaining>0 && remaining<=3) return `${remaining} habit${remaining>1?'s':''} away from a perfect day.`;
    return "Momentum is building slowly — show up today.";
  }
  return "Reset moment. One small win today restarts the climb.";
}

/* ---------- RENDER: SVG RINGS ---------- */
function ringSVG(percent, opts={}){
  const size = opts.size||184, stroke=opts.stroke||14, color=opts.color||'#8B6CFF', track=opts.track||'rgba(127,127,150,.16)';
  const r = (size-stroke)/2, c = size/2, circ = 2*Math.PI*r;
  const p = Math.max(0,Math.min(100,percent||0));
  const dash = circ*(p/100);
  return `<svg viewBox="0 0 ${size} ${size}">
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
    <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
      stroke-dasharray="${dash} ${circ}" style="transition:stroke-dasharray .7s cubic-bezier(.2,.8,.2,1)"/>
  </svg>`;
}
function multiRingSVG(rings, size=184){
  // rings: [{pct,color}], outer to inner
  const stroke = 12, gap=4;
  let svg = `<svg viewBox="0 0 ${size} ${size}">`;
  rings.forEach((rg,i)=>{
    const r = (size - stroke)/2 - i*(stroke+gap);
    if(r<=10) return;
    const c=size/2, circ=2*Math.PI*r, p=Math.max(0,Math.min(100,rg.pct||0)), dash=circ*(p/100);
    svg += `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="rgba(127,127,150,.14)" stroke-width="${stroke}"/>`;
    svg += `<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${rg.color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${dash} ${circ}" style="transition:stroke-dasharray .7s cubic-bezier(.2,.8,.2,1)"/>`;
  });
  svg += '</svg>';
  return svg;
}

function toast(msg, icon='check'){

/* ---------- ACHIEVEMENTS ---------- */
function isPerfectWeek(){
  const all = activeHabits();
  if(!all.length) return false;
  for(let i=0;i<7;i++){
    const ds = toISO(addDays(todayDate(),-i));
    for(const h of all){
      if(ds<h.createdAt) continue;
      if(isDueOnDay(h, ds)){
        const rec = getCompletion(h.id, ds);
        if(!isDoneRec(rec) && !isFreezeRec(rec)) return false;
      }
    }
  }
  return true;
}
function isReflective7(){
  for(let i=0;i<7;i++){
    const ds = toISO(addDays(todayDate(),-i));
    if(!DB.dailyLogs[ds] || DB.dailyLogs[ds].mood==null) return false;
  }
  return true;
}
function checkAchievements(){
  const unlocked = DB.appState.unlockedAchievements;
  const newly = [];
  function maybe(id, cond){ if(cond && !unlocked.includes(id)){ unlocked.push(id); newly.push(id); } }
  maybe('first-habit', DB.habits.length>=1);
  maybe('streak-7', DB.habits.some(h=>computeCurrentStreak(h)>=7));
  maybe('streak-30', DB.habits.some(h=>computeCurrentStreak(h)>=30));
  maybe('streak-100', DB.habits.some(h=>computeCurrentStreak(h)>=100));
  maybe('streak-365', DB.habits.some(h=>computeCurrentStreak(h)>=365));
  maybe('perfect-week', isPerfectWeek());
  maybe('comeback', DB.appState.comebacksAchieved.length>0);
  maybe('reflective-7', isReflective7());
  maybe('level-5', DB.appState.level>=5);
  maybe('level-10', DB.appState.level>=10);
  if(newly.length){
    saveDB();
    newly.forEach(id=>{
      const def = ACHIEVEMENTS_DEF.find(a=>a.id===id);
      if(def) toast('Unlocked: '+def.label, 'trophy');
    });
  }
}

/* ---------- INSIGHTS ---------- */
function computeInsights(){
  const all = activeHabits();
  if(!all.length) return null;
  const perf = all.map(h=>{
    const s30 = rangeStats(h, ...last30());
    return {h, pct: s30.due>0 ? s30.completed/s30.due*100 : null, due:s30.due};
  }).filter(x=>x.pct!==null && x.due>=2);
  let best=null, worst=null;
  if(perf.length){
    best = perf.reduce((a,b)=> b.pct>a.pct ? b : a);
    worst = perf.reduce((a,b)=> b.pct<a.pct ? b : a);
  }
  const thisWeek = pctInRange(all, ...thisWeekRange());
  const lastWeekStart = addDays(startOfWeek(todayDate()),-7);
  const lastWeekEnd = addDays(startOfWeek(todayDate()),-1);
  const lastWeek = pctInRange(all, lastWeekStart, lastWeekEnd);
  const improvement = (thisWeek!==null && lastWeek!==null) ? thisWeek-lastWeek : null;
  const predictions = all.map(h=>{
    const cur = computeCurrentStreak(h);
    if(cur<2) return null;
    const s14 = rangeStats(h, addDays(todayDate(),-13), todayDate());
    const rate = s14.due>0 ? s14.completed/s14.due : 0;
    let label, level;
    if(rate>=.85){label='Highly likely to continue'; level='up';}
    else if(rate>=.6){label='On track'; level='up';}
    else if(rate>=.4){label='At risk — stay sharp'; level='down';}
    else {label='Fragile — needs attention'; level='down';}
    return {h, cur, rate, label, level};
  }).filter(Boolean).sort((a,b)=>b.cur-a.cur);
  return {best, worst, thisWeek, lastWeek, improvement, predictions};
}
function mostImprovedHabit(){
  const all = activeHabits();
  let best=null;
  all.forEach(h=>{
    const d = todayDate();
    const thisMonth = rangeStats(h, new Date(d.getFullYear(),d.getMonth(),1), d);
    const lastMonthStart = new Date(d.getFullYear(),d.getMonth()-1,1);
    const lastMonthEnd = new Date(d.getFullYear(),d.getMonth(),0);
    const lastMonth = rangeStats(h, lastMonthStart, lastMonthEnd);
    if(thisMonth.due<2 || lastMonth.due<2) return;
    const tp = thisMonth.completed/thisMonth.due*100, lp = lastMonth.completed/lastMonth.due*100;
    const delta = tp-lp;
    if(!best || delta>best.delta) best = {h, delta, tp, lp};
  });
  return best;
}

      <div class="cat-group">
        <div class="cat-group-title"><span class="dot-sm" style="background:${CATEGORIES[cat].hex}"></span>${CATEGORIES[cat].label}</div>
        ${groups[cat].map(h=>habitRowHTML(h, todayStr())).join('')}
      </div>`).join('');
  }
  root.innerHTML = html;
}

   HABIT DETAIL MODAL
   =================================================================== */
function openHabitDetail(id){
  const h = habitById(id);
  if(!h) return;
  const cat = CATEGORIES[h.category];
  const cur = computeCurrentStreak(h), longest = computeLongestStreak(h);
  const s7 = rangeStats(h, ...last7());
  const s30 = rangeStats(h, ...last30());
  const total = totalCompletions(h);
  const pct7 = s7.due? Math.round(s7.completed/s7.due*100):0;
  const pct30 = s30.due? Math.round(s30.completed/s30.due*100):0;
  const milestones = [7,30,100,365];

  // build 12-week heatmap strip for this habit
  const cells=[];
  for(let i=83;i>=0;i--){
    const ds = toISO(addDays(todayDate(),-i));
    const rec = getCompletion(h.id, ds);
    const due = isDueOnDay(h, ds) && ds<=todayStr() && ds>=h.createdAt;
    let state = 'none';
    if(due){ state = isDoneRec(rec)?'done': isFreezeRec(rec)?'frozen': (ds<todayStr()?'missed':'pending'); }
    cells.push({ds, state});
  }

  const html = `
  <div class="modal-handle"></div>
  <div class="modal-head">
    <h3 style="display:flex;align-items:center;gap:8px"><span class="dot-sm" style="background:${cat.hex};width:10px;height:10px"></span>${escapeHtml(h.name)}</h3>
    <button class="icon-btn" data-action="close-modal">${ic('x',16)}</button>
  </div>
  <div style="display:flex; gap:8px; margin-bottom:16px;">
    <span class="chip">${cat.label}</span>
    ${h.frequency.type==='weekly'?`<span class="chip">${h.frequency.target}x / week</span>`:h.frequency.type==='custom'?`<span class="chip">${DAY_LABELS.filter((d,i)=>h.frequency.days.includes(i)).join(' ')}</span>`:`<span class="chip">Daily</span>`}
  </div>
  <div class="ring-row" style="margin-bottom:18px">
    <div class="mini-ring-box">${ringSVG(pct30,{size:58,stroke:7,color:cat.hex})}<div class="mini-ring-val mono">${pct30}%</div></div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:650">30-day completion</div>
      <div class="faint" style="font-size:11.5px">${s30.completed}/${s30.due} completed · ${s30.missed} missed</div>
    </div>
  </div>
  <div class="stat-grid" style="margin-top:0">
    <div class="stat-box"><div class="val mono" style="color:${cat.hex}">${cur}</div><div class="lbl">Current streak</div></div>
    <div class="stat-box"><div class="val mono">${longest}</div><div class="lbl">Longest streak</div></div>
    <div class="stat-box"><div class="val mono">${pct7}%</div><div class="lbl">7-day consistency</div></div>
    <div class="stat-box"><div class="val mono">${total}</div><div class="lbl">Total completions</div></div>
  </div>

  <div class="section-title"><h2>Streak Calendar</h2></div>
  <div class="heatmap-scroll"><div class="heatmap-grid">
    ${cells.map(c=>`<div class="hm-cell" title="${c.ds}" style="background:${hmColor(c.state,cat.hex)}"></div>`).join('')}
  </div></div>

  <div class="section-title"><h2>Milestones</h2></div>
  <div class="badge-row">
    ${milestones.map(m=>`
      <div class="badge ${longest>=m?'unlocked':''}">
        <div class="badge-ico">${ic(m>=100?'trophy':'flame',20)}</div>
        <div class="b-lbl">${m}d</div>
      </div>`).join('')}
  </div>

  <div class="modal-actions" style="margin-top:22px; flex-wrap:wrap;">
    <button class="btn btn-secondary" data-action="use-freeze" data-id="${h.id}">${ic('snow',15)} Freeze today</button>
    <button class="btn btn-secondary" data-action="edit-habit" data-id="${h.id}">${ic('edit',15)} Edit</button>
    <button class="btn btn-ghost" data-action="archive-habit" data-id="${h.id}">${ic('archive',15)} Archive</button>
    <button class="btn btn-danger" data-action="delete-habit" data-id="${h.id}">${ic('trash',15)} Delete</button>
  </div>`;
  openModal(html);
}
function hmColor(state, hex){
  if(state==='done') return hex;
  if(state==='frozen') return 'color-mix(in srgb, '+hex+' 35%, var(--bg-elevated))';
  if(state==='missed') return 'rgba(255,92,92,.30)';
  return 'var(--bg-elevated)';
}

      ${Object.keys(MIND_SUBTYPES).map(k=>`<option value="${k}" ${h&&h.subtype===k?'selected':''}>${MIND_SUBTYPES[k]}</option>`).join('')}

  }

function renderFreqDetail(){
  const el = document.getElementById('freq-detail');
  if(!el) return;
  if(formFrequencyType==='weekly'){
    const h = editingHabitId ? habitById(editingHabitId) : null;
    el.innerHTML = `<div class="field"><label>Times per week</label><input type="number" name="weeklyTarget" min="1" max="7" value="${h&&h.frequency.target?h.frequency.target:3}"></div>`;

    el.innerHTML = `<div class="field"><label>Repeat on</label><div class="day-toggles">

    </div></div>`;

function renderSleepFields(cat, h){
  const el = document.getElementById('sleep-fields');
  if(!el) return;
  if(cat==='sleep'){
    el.innerHTML = `
    <div class="field"><label>Target bedtime</label><input type="time" name="bedtime" value="${h&&h.sleepTarget?h.sleepTarget.bedtime:'23:00'}"></div>
    <div class="field"><label>Target sleep duration (hours)</label><input type="number" step="0.25" name="duration" value="${h&&h.sleepTarget?h.sleepTarget.duration:8}"></div>`;
  } else el.innerHTML='';

function saveHabitForm(form){
  const fd = new FormData(form);
  const name = (fd.get('name')||'').toString().trim();
  if(!name){ toast('Give your habit a name'); return; }
  const catBtn = document.querySelector('#cat-pick .cat-pick-item.active');
  const category = catBtn ? catBtn.dataset.cat : 'fitness';
  let frequency = {type:formFrequencyType};
  if(formFrequencyType==='weekly') frequency.target = Math.max(1, Math.min(7, parseInt(fd.get('weeklyTarget'))||3));
  if(formFrequencyType==='custom') frequency.days = formFrequencyDays.slice().sort();
  const subtype = fd.get('subtype') || null;
  let sleepTarget = null;
  if(category==='sleep') sleepTarget = {bedtime: fd.get('bedtime')||'23:00', duration: parseFloat(fd.get('duration'))||8};

  if(editingHabitId){
    const h = habitById(editingHabitId);
    Object.assign(h, {name, category, frequency, subtype, sleepTarget});
  } else {
    DB.habits.push({
      id:'h_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      name, category, frequency, subtype, sleepTarget,
      createdAt: todayStr(), archived:false
    });
  }
  saveDB();
  closeModal();
  checkAchievements();
  renderAll();
  toast(editingHabitId?'Habit updated':'Habit created', 'check');
  editingHabitId = null;
}
function addSuggestedHabit(idx){
  const s = SUGGESTED[idx];
  if(!s) return;
  DB.habits.push(Object.assign({
    id:'h_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    createdAt: todayStr(), archived:false, subtype: s.subtype||null, sleepTarget: s.sleepTarget||null
  }, {name:s.name, category:s.category, frequency:s.frequency}));
  saveDB(); checkAchievements(); renderAll();
  toast('Added "'+s.name+'"', 'check');
}

/* ===================================================================
   STATS PAGE
   =================================================================== */
let statsTab = 'overview';
function renderStatsPage(){
  const root = document.getElementById('page-stats');
  const all = activeHabits();
  if(!all.length){
    root.innerHTML = `<div class="card empty-state" style="margin-top:0"><p style="margin:0">Add habits to unlock statistics, heatmaps and trend reports.</p></div>`;
    return;
  }
  const tabs = ['overview','heatmap','records'];
  let html = `<div class="tabbar">
    ${tabs.map(t=>`<button class="${statsTab===t?'active':''}" data-action="stats-tab" data-tab="${t}">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
  </div>`;

  if(statsTab==='overview'){
    const thisMonth = pctInRange(all, ...thisMonthRange());
    const d = todayDate();
    const lastMonthStart = new Date(d.getFullYear(),d.getMonth()-1,1), lastMonthEnd = new Date(d.getFullYear(),d.getMonth(),0);
    const lastMonth = pctInRange(all, lastMonthStart, lastMonthEnd);
    const yearStart = new Date(d.getFullYear(),0,1);
    const yearPct = pctInRange(all, yearStart, d);
    let totalDue=0, totalComp=0, totalMissed=0;
    all.forEach(h=>{ const s = rangeStats(h, parseISO(h.createdAt), d); totalDue+=s.due; totalComp+=s.completed; totalMissed+=s.missed; });

    // weekly trend bar chart - last 8 weeks
    const weeks=[];
    for(let i=7;i>=0;i--){
      const ws = addDays(startOfWeek(d), -7*i);
      const we = addDays(ws,6) > d ? d : addDays(ws,6);
      const pct = pctInRange(all, ws, we);
      weeks.push({label: fmtDateShort(ws), pct: pct||0});
    }

    html += `
    <div class="section-title" style="margin-top:0"><h2>Monthly Report</h2></div>
    <div class="stat-grid">
      <div class="stat-box"><div class="val mono">${Math.round(thisMonth||0)}%</div><div class="lbl">This month</div></div>
      <div class="stat-box"><div class="val mono">${Math.round(lastMonth||0)}%</div><div class="lbl">Last month</div></div>
      <div class="stat-box"><div class="val mono">${Math.round(yearPct||0)}%</div><div class="lbl">Year to date</div></div>
      <div class="stat-box"><div class="val mono">${totalMissed}</div><div class="lbl">Missed (all time)</div></div>
    </div>
    <div class="section-title"><h2>Weekly Trend</h2></div>
    <div class="card">
      <div class="bar-chart">
        ${weeks.map(w=>`<div class="bar-col"><div class="bar" style="height:${Math.max(4,w.pct)}%; background:linear-gradient(180deg, var(--accent-violet), var(--accent-indigo))"></div><div class="bar-lbl">${w.label}</div></div>`).join('')}
      </div>
    </div>
    <div class="section-title"><h2>Per-Habit Completion</h2></div>
    <div class="card">
      ${all.map(h=>{
        const s30 = rangeStats(h, ...last30());
        const pct = s30.due? Math.round(s30.completed/s30.due*100):0;
        return `<div style="margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px"><span style="font-weight:650">${escapeHtml(h.name)}</span><span class="mono faint">${pct}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:${CATEGORIES[h.category].hex}"></div></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  if(statsTab==='heatmap'){
    const weeksCount = 20;
    const startDate = addDays(startOfWeek(todayDate()), -7*(weeksCount-1));
    const cells = [];
    let cursor = new Date(startDate);
    while(cursor<=todayDate()){
      const ds = toISO(cursor);
      let due=0, comp=0;
      all.forEach(h=>{ if(isDueOnDay(h,ds) && ds>=h.createdAt && ds<=todayStr()){ due++; const r=getCompletion(h.id,ds); if(isDoneRec(r)||isFreezeRec(r)) comp++; } });
      const ratio = due>0 ? comp/due : -1;
      cells.push({ds, ratio});
      cursor = addDays(cursor,1);
    }
    html += `
    <div class="section-title" style="margin-top:0"><h2>Habit Heatmap</h2></div>
    <div class="card">
      <div class="heatmap-scroll"><div class="heatmap-grid">
        ${cells.map(c=>`<div class="hm-cell" title="${c.ds}: ${c.ratio<0?'no habits due':Math.round(c.ratio*100)+'%'}" style="background:${heatColor(c.ratio)}"></div>`).join('')}
      </div></div>
      <div class="hm-legend">Less <div class="hm-cell" style="background:var(--bg-elevated)"></div><div class="hm-cell" style="background:${heatColor(.25)}"></div><div class="hm-cell" style="background:${heatColor(.5)}"></div><div class="hm-cell" style="background:${heatColor(.75)}"></div><div class="hm-cell" style="background:${heatColor(1)}"></div> More</div>
    </div>`;
  }

  if(statsTab==='records'){
    const recs = all.map(h=>({h, longest:computeLongestStreak(h), cur:computeCurrentStreak(h)})).sort((a,b)=>b.longest-a.longest);
    const improved = mostImprovedHabit();
    html += `
    <div class="section-title" style="margin-top:0"><h2>Longest Streak Records</h2></div>
    <div class="card">
      ${recs.map((r,i)=>`
        <div style="display:flex;align-items:center;gap:12px; padding:10px 0; ${i<recs.length-1?'border-bottom:1px solid var(--border-subtle)':''}">
          <div class="mono faint" style="width:18px">#${i+1}</div>
          <span class="dot-sm" style="background:${CATEGORIES[r.h.category].hex}"></span>
          <div style="flex:1; font-size:13.5px; font-weight:650">${escapeHtml(r.h.name)}</div>
          <div class="mono" style="font-weight:700; color:var(--accent-coral)">${r.longest}d</div>
        </div>`).join('')}
    </div>
    <div class="section-title"><h2>Most Improved</h2></div>
    <div class="card">
      ${improved ? `
        <div class="insight-card" style="margin:0; background:transparent; border:none; padding:0">
          <div class="i-ico" style="background:rgba(61,220,151,.15)">${ic('up',18)}</div>
          <div>
            <h4>${escapeHtml(improved.h.name)}</h4>
            <p>Up ${Math.round(improved.delta)} points this month (${Math.round(improved.lp)}% → ${Math.round(improved.tp)}%)</p>
          </div>
        </div>` : `<p class="faint" style="font-size:12.5px;margin:0">Not enough history yet — check back after a few weeks.</p>`}
    </div>`;
  }

  root.innerHTML = html;
}
function heatColor(ratio){
  if(ratio<0) return 'var(--bg-elevated)';
  if(ratio===0) return 'rgba(139,108,255,.10)';
  if(ratio<.34) return 'rgba(139,108,255,.35)';
  if(ratio<.67) return 'rgba(139,108,255,.6)';
  if(ratio<1) return 'rgba(139,108,255,.85)';
  return '#8B6CFF';
}

      html += `<div style="display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border-subtle)">
        <span class="dot-sm" style="background:${CATEGORIES[p.h.category].hex}"></span>
        <div style="flex:1"><div style="font-size:13px;font-weight:650">${escapeHtml(p.h.name)}</div><div class="faint" style="font-size:11.5px">${p.cur}-day streak</div></div>
        <span class="kpi-pill ${p.level}">${p.label}</span>
      </div>`;
    });
    html += `</div>`;
  }
  root.innerHTML = html.replace(/border-bottom:1px solid var\(--border-subtle\)(?=[\s\S]*?$)/,'');
  // fix last item border
  const card = root.querySelectorAll('.card');
  card.forEach(c=>{ const items=c.children; if(items.length){ const last=items[items.length-1]; if(last && last.style) last.style.borderBottom='none'; }});
  if(!html.trim()){
    root.innerHTML = `<div class="card empty-state" style="margin-top:0">
      <div class="ico">${ic('bulb',26)}</div>
      <h3>Building your insights</h3>
      <p>Keep logging your habits for a few more days. Once there's enough history, you'll see streak predictions, performance trends, and behavioral patterns here.</p>
    </div>`;
  }
}

  </div>`;

  if(reflectTab==='today'){
    html += `
    <div class="card" style="margin-top:0">
      <h3 style="font-size:15px;margin-bottom:18px">Daily Reflection · ${fmtDateShort(todayDate())}</h3>

    if(!entries.length) html += `<p class="faint" style="margin:0;font-size:12.5px">No reflections logged yet.</p>`;
    entries.forEach((d,i)=>{

      html += `<div style="padding:11px 0; ${i<entries.length-1?'border-bottom:1px solid var(--border-subtle)':''}">

        </div>
        ${l.note?`<p class="faint" style="font-size:12px;margin:0">${escapeHtml(l.note)}</p>`:''}
      </div>`;
    });
    html += `</div>`;
  }

  if(reflectTab==='weekly'){
    const wk = weekKey(todayDate());
    const review = DB.weeklyReviews[wk] || {wins:'', challenges:'', focusNext:''};
    const all = activeHabits();
    const pct = Math.round(pctInRange(all, ...thisWeekRange())||0);
    html += `
    <div class="card" style="margin-top:0">
      <h3 style="font-size:15px;margin-bottom:6px">Week of ${fmtDateShort(parseISO(wk))}</h3>
      <p class="faint" style="font-size:12.5px;margin-bottom:16px">Overall consistency this week: <strong style="color:var(--ink-primary)">${pct}%</strong></p>
      <div class="field"><label>What were your wins this week?</label><textarea class="full" id="rev-wins" style="min-height:80px">${escapeHtml(review.wins)}</textarea></div>
      <div class="field"><label>What got in the way?</label><textarea class="full" id="rev-challenges" style="min-height:80px">${escapeHtml(review.challenges)}</textarea></div>
      <div class="field"><label>One thing to focus on next week</label><textarea class="full" id="rev-focus" style="min-height:60px">${escapeHtml(review.focusNext)}</textarea></div>
      <button class="btn btn-primary btn-block" data-action="save-weekly-review">Save weekly review</button>
    </div>
    <div class="section-title"><h2>Past Reviews</h2></div>
    <div class="card">
      ${Object.keys(DB.weeklyReviews).sort().reverse().filter(k=>k!==wk).slice(0,6).map(k=>`
        <div style="padding:9px 0;border-bottom:1px solid var(--border-subtle)">
          <div style="font-size:12.5px;font-weight:650;margin-bottom:3px">Week of ${fmtDateShort(parseISO(k))}</div>
          <p class="faint" style="font-size:11.5px;margin:0">${escapeHtml(DB.weeklyReviews[k].wins||'No notes')}</p>
        </div>`).join('') || '<p class="faint" style="font-size:12px;margin:0">No past reviews yet.</p>'}
    </div>`;
  }

  root.innerHTML = html;
}
function sliderRow(key,label,icon,color,val,emojis){
  return `<div class="slider-row" data-slider="${key}">
    <div class="slider-head"><span class="lab">${ic(icon,16)} ${label}</span><span class="cur">${val?emojis[val-1]+' '+val+'/5':'—'}</span></div>
    <div class="range-track">
      ${[1,2,3,4,5].map(n=>`<button type="button" class="range-seg ${val&&n<=val?'filled':''}" style="--seg-color:${color}" data-action="set-slider" data-key="${key}" data-val="${n}"></button>`).join('')}
    </div>
  </div>`;
}

/* ---------- DATA: CSV / BACKUP / RESTORE ---------- */
function exportCSV(){
  const rows = [['habit','category','date','completed','frozen','value']];
  Object.keys(DB.completions).forEach(k=>{
    const [habitId,date] = k.split('|');
    const h = habitById(habitId);
    const rec = DB.completions[k];
    let value = '';
    if(rec.duration!=null) value = rec.duration+'h sleep, bedtime '+(rec.bedtime||'');
    if(rec.weight!=null) value = rec.weight+'kg';
    rows.push([h?h.name:habitId, h?CATEGORIES[h.category].label:'', date, rec.completed?'yes':'no', rec.freeze?'yes':'no', value]);
  });
  const csv = rows.map(r=>r.map(v=>`"${(v+'').replace(/"/g,'""')}"`).join(',')).join('\n');
  downloadBlob(csv, 'momentum-export.csv', 'text/csv');
  toast('CSV exported', 'download');
}
function backupData(){
  downloadBlob(JSON.stringify(DB,null,2), 'momentum-backup.json', 'application/json');
  toast('Backup saved', 'download');
}
function downloadBlob(content, filename, type){
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function restoreData(){ document.getElementById('restore-input').click(); }
function handleRestoreFile(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.habits || !parsed.appState){ toast('Invalid backup file'); return; }
      DB = parsed; saveDB(); renderAll();
      toast('Data restored', 'check');
    }catch(e){ toast('Could not read backup file'); }
  };
  reader.readAsText(file);
}
function confirmResetData(){
  openModal(`
  <div class="confirm-box">
    <div class="ico">${ic('trash',22)}</div>
    <h3 style="margin-bottom:8px">Reset all data?</h3>
    <p class="faint" style="font-size:13px;margin-bottom:18px">This permanently deletes every habit, streak and reflection. This can't be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-block" data-action="close-modal">Cancel</button>
      <button class="btn btn-danger btn-block" data-action="confirm-reset">Reset</button>
    </div>
  </div>`);
}

/* ===================================================================
   MODAL / THEME / EVENT WIRING
   =================================================================== */
function openModal(html){
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  editingHabitId = null;
}
function toggleTheme(){
  DB.appState.theme = DB.appState.theme==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', DB.appState.theme);
  saveDB();
  renderHeaderChips();
}
let pendingDeleteId = null;
function confirmDeleteHabit(id){
  pendingDeleteId = id;
  const h = habitById(id);
  openModal(`
  <div class="confirm-box">
    <div class="ico">${ic('trash',22)}</div>
    <h3 style="margin-bottom:8px">Delete "${escapeHtml(h.name)}"?</h3>
    <p class="faint" style="font-size:13px;margin-bottom:18px">This removes the habit and all its history permanently.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-block" data-action="close-modal">Cancel</button>
      <button class="btn btn-danger btn-block" data-action="confirm-delete">Delete</button>
    </div>
  </div>`);
}

document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const a = el.dataset.action;
  switch(a){
    case 'nav': switchPage(el.dataset.page); break;
    case 'toggle-habit': toggleHabit(el.dataset.id, el.dataset.date); break;
    case 'open-habit-detail': openHabitDetail(el.dataset.id); break;
    case 'open-add-habit': openHabitModal(); break;
    case 'edit-habit': closeModal(); setTimeout(()=>openHabitModal(el.dataset.id),180); break;
    case 'archive-habit': { const h=habitById(el.dataset.id); h.archived=true; saveDB(); closeModal(); renderAll(); toast('Habit archived','archive'); break; }
    case 'unarchive-habit': { const h=habitById(el.dataset.id); h.archived=false; saveDB(); renderAll(); toast('Habit restored','check'); break; }
    case 'delete-habit': confirmDeleteHabit(el.dataset.id); break;
    case 'confirm-delete': { DB.habits = DB.habits.filter(h=>h.id!==pendingDeleteId); Object.keys(DB.completions).forEach(k=>{ if(k.startsWith(pendingDeleteId+'|')) delete DB.completions[k]; }); saveDB(); closeModal(); renderAll(); toast('Habit deleted','trash'); break; }
    case 'use-freeze': useFreezeOnHabit(el.dataset.id); break;
    case 'close-modal': closeModal(); break;
    case 'theme-toggle': toggleTheme(); break;
    case 'habit-filter': DB.appState.habitFilter = el.dataset.cat; saveDB(); renderHabitsPage(); break;
    case 'pick-category': {
      document.querySelectorAll('#cat-pick .cat-pick-item').forEach(x=>x.classList.remove('active'));
      el.classList.add('active');
      renderSubtypeField(el.dataset.cat, editingHabitId?habitById(editingHabitId):null);
      renderSleepFields(el.dataset.cat, editingHabitId?habitById(editingHabitId):null);
      break;
    }
    case 'set-freq': formFrequencyType = el.dataset.freq; renderHabitFormFreqUI(); break;
    case 'toggle-day': {
      const d = parseInt(el.dataset.day);
      const i = formFrequencyDays.indexOf(d);
      if(i>=0) formFrequencyDays.splice(i,1); else formFrequencyDays.push(d);
      renderFreqDetail();
      break;
    }
    case 'add-suggested': addSuggestedHabit(parseInt(el.dataset.idx)); break;
    case 'stats-tab': statsTab = el.dataset.tab; renderStatsPage(); break;
    case 'reflect-tab': reflectTab = el.dataset.tab; renderReflectPage(); break;
    case 'set-slider': setSliderValue(el.dataset.key, parseInt(el.dataset.val)); break;
    case 'save-reflection': saveReflection(); break;
    case 'save-weekly-review': saveWeeklyReview(); break;
    case 'export-csv': exportCSV(); break;
    case 'backup-data': backupData(); break;
    case 'restore-data': restoreData(); break;
    case 'reset-data': confirmResetData(); break;
    case 'confirm-reset': DB = defaultDB(); DB.appState.theme = document.documentElement.getAttribute('data-theme'); saveDB(); closeModal(); switchPage('home'); toast('All data reset','refresh'); break;
    case 'open-gamify': switchPage('settings'); break;
  }
});
function renderHabitFormFreqUI(){
  document.querySelectorAll('#freq-seg button').forEach(b=>b.classList.toggle('active', b.dataset.freq===formFrequencyType));
  renderFreqDetail();
}
let pendingReflect = {mood:null, energy:null, focus:null};
function setSliderValue(key,val){
  pendingReflect[key]=val;
  const row = document.querySelector(`[data-slider="${key}"]`);
  row.querySelectorAll('.range-seg').forEach((seg,i)=>seg.classList.toggle('filled', i<val));
  const emojiMap = {mood:['😞','🙁','😐','🙂','😄'], energy:['🪫','🔋','🔋','⚡','⚡'], focus:['🌫️','🌫️','🎯','🎯','🎯']};
  row.querySelector('.cur').textContent = emojiMap[key][val-1]+' '+val+'/5';
}
function saveReflection(){
  const ds = todayStr();
  const existing = DB.dailyLogs[ds] || {};
  const note = document.getElementById('reflect-note').value;
  DB.dailyLogs[ds] = {
    mood: pendingReflect.mood ?? existing.mood ?? null,
    energy: pendingReflect.energy ?? existing.energy ?? null,
    focus: pendingReflect.focus ?? existing.focus ?? null,
    note
  };
  saveDB(); checkAchievements();
  toast('Reflection saved','check');
  pendingReflect = {mood:null,energy:null,focus:null};
}
function saveWeeklyReview(){
  const wk = weekKey(todayDate());
  DB.weeklyReviews[wk] = {
    wins: document.getElementById('rev-wins').value,
    challenges: document.getElementById('rev-challenges').value,
    focusNext: document.getElementById('rev-focus').value,
  };
  saveDB();
  toast('Weekly review saved','check');
  renderReflectPage();
}

document.addEventListener('submit', (e)=>{
  if(e.target.id==='habit-form'){ e.preventDefault(); saveHabitForm(e.target); }
  if(e.target.id==='log-value-form'){ e.preventDefault(); saveLogValue(e.target); }
});
document.addEventListener('change', (e)=>{
  if(e.target.id==='restore-input' && e.target.files[0]) handleRestoreFile(e.target.files[0]);
});
document.getElementById('modal-overlay').addEventListener('click', (e)=>{
  if(e.target.id==='modal-overlay') closeModal();
});

/* ---------- INIT ---------- */
async function init(){
  await loadDB();
  document.documentElement.setAttribute('data-theme', DB.appState.theme||'dark');
  if(!NAV_ITEMS.find(n=>n.id===DB.appState.currentPage) && DB.appState.currentPage!=='settings') DB.appState.currentPage='home';
  renderNav();
  renderHeaderChips();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+DB.appState.currentPage).classList.add('active');
  renderPage(DB.appState.currentPage);
  checkAchievements();
}
init();
</script>
